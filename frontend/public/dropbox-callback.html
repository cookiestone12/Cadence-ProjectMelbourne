<!DOCTYPE html>
<html>
<head>
  <title>Connecting Dropbox...</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f7f4; color: #3D4A44; }
    .container { text-align: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e0e5df; border-top-color: #5B8A72; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Connecting to Dropbox...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code && window.opener) {
      window.opener.postMessage({ type: 'dropbox_callback', code: code }, '*');
      setTimeout(() => window.close(), 1500);
    } else if (code) {
      document.querySelector('p').textContent = 'Connected! You can close this window.';
    } else {
      document.querySelector('p').textContent = 'No authorization code received. Please try again.';
    }
  </script>
</body>
</html>
